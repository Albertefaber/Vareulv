<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Varulv</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0D0B12;--surface:#161320;--surface2:#1E1A2E;--border:#2A2540;--text:#F0EDE8;--muted:#8A8098;--accent:#C4722A;--purple:#7C3AED;--red:#DC2626;--green:#059669;--gold:#D97706}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.page{display:none}.page.show{display:block}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;gap:10px}
.logo{font-family:'DM Serif Display',serif;font-size:20px;flex:1}
.logo em{color:var(--purple);font-style:italic}
.content{padding:1.5rem;max-width:680px;margin:0 auto}
.sec{font-family:'DM Serif Display',serif;font-size:18px;margin:1.25rem 0 .65rem}
.kode-box{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:1.25rem;text-align:center;margin-bottom:1.5rem}
.kode-lbl{font-size:12px;color:var(--muted);margin-bottom:.4rem}
.kode-num{font-family:'DM Serif Display',serif;font-size:52px;letter-spacing:10px;color:var(--purple)}
.kode-url{font-size:11px;color:var(--muted);margin-top:.3rem}
.roller-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:1.5rem}
.rk{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:.85rem .75rem;text-align:center}
.rk.on{border-color:var(--green);background:#021A0E}
.re{font-size:26px;display:block;margin-bottom:4px}
.rn{font-size:13px;font-weight:500}
.antal-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px}
.ab{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);background:none;color:var(--text);cursor:pointer;font-size:15px;line-height:1}
.ab:hover{border-color:var(--purple)}
.an{font-size:14px;font-weight:500;min-width:18px;text-align:center}
.spiller-liste{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem}
.sr{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.65rem 1rem;display:flex;align-items:center;gap:10px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-venter{background:var(--muted)}
.dot-klar{background:var(--green)}
.sn{flex:1;font-size:14px}
.sr-rolle{font-size:12px;color:var(--muted)}
.btn{padding:10px 18px;border-radius:10px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;display:inline-flex;align-items:center;gap:6px}
.btn-p{background:var(--purple);color:#fff}
.btn-p:hover{opacity:.9}
.btn-g{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-g:hover{border-color:var(--purple)}
.btn-r{background:var(--red);color:#fff}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
/* JOIN */
.center-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.join-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem;width:100%;max-width:360px;text-align:center}
.join-title{font-family:'DM Serif Display',serif;font-size:28px;margin-bottom:.4rem}
.join-sub{font-size:13px;color:var(--muted);margin-bottom:1.5rem}
.inp{width:100%;padding:11px 14px;font-size:16px;border:1.5px solid var(--border);border-radius:10px;background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;margin-bottom:.75rem;text-align:center;letter-spacing:3px}
.inp-navn{letter-spacing:0;text-align:left}
.inp:focus{outline:none;border-color:var(--purple)}
/* VENTER */
.venter-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;text-align:center;padding:2rem}
.puls{animation:p 2s ease-in-out infinite}
@keyframes p{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.95)}}
/* ROLLE */
.rolle-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.rolle-card{background:var(--surface);border:2px solid var(--border);border-radius:20px;padding:2rem 1.75rem;max-width:400px;width:100%;text-align:center}
.re-big{font-size:90px;display:block;margin-bottom:.75rem;line-height:1}
.rt{font-family:'DM Serif Display',serif;font-size:34px;margin-bottom:.4rem}
.rs{font-size:14px;font-weight:500;margin-bottom:1.25rem}
.rd{font-size:15px;line-height:1.8;background:var(--surface2);border-radius:12px;padding:1.25rem;margin-bottom:1rem;text-align:left}
.rtip{font-size:13px;background:#1A1208;border:1px solid #92400E;color:var(--gold);border-radius:8px;padding:.75rem 1rem;text-align:left}
/* SPIL */
.fase-tabs{display:flex;gap:8px;margin-bottom:1.25rem}
.fase-tab{flex:1;padding:11px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-family:'DM Serif Display',serif;font-size:15px;color:var(--muted)}
.fase-tab.dag{border-color:var(--gold);color:var(--gold);background:#1A1208}
.fase-tab.nat{border-color:var(--purple);color:var(--purple);background:#12102A}
.log{display:flex;flex-direction:column;gap:3px;max-height:180px;overflow-y:auto}
.log-item{font-size:12px;color:var(--muted);padding:3px 8px;border-radius:5px;background:var(--surface)}
.log-item.d{color:#F87171}
.log-item.h{color:#6EE7B7}
/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--purple);color:#fff;padding:9px 18px;border-radius:99px;font-size:13px;z-index:999;opacity:0;transition:all .25s;pointer-events:none}
.toast.vis{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- LEDER -->
<div class="page show" id="p-leder">
  <div class="topbar">
    <div class="logo">🌕 <em>Varulv</em></div>
    <span style="font-size:12px;background:#1E1A2E;color:var(--purple);border:1px solid var(--purple);padding:4px 10px;border-radius:99px">👑 Lærer</span>
  </div>
  <div class="content">
    <div class="kode-box">
      <div class="kode-lbl">Del denne kode med eleverne</div>
      <div class="kode-num" id="kode-vis">—</div>
      <div class="kode-url">albertefaber.github.io/vareulv</div>
    </div>

    <div class="sec">🎭 Vælg roller og antal</div>
    <div class="roller-grid" id="roller-grid"></div>

    <div class="sec">👥 Spillere (<span id="spiller-count">0</span>)</div>
    <div class="spiller-liste" id="spiller-liste">
      <div style="font-size:13px;color:var(--muted);font-style:italic">Ingen spillere endnu</div>
    </div>

    <div class="btn-row">
      <button class="btn btn-p" onclick="startSpil()">🎲 Start — tildel roller</button>
      <button class="btn btn-g" onclick="nytSpil()">🔄 Nyt spil</button>
    </div>

    <div id="spil-panel" style="display:none">
      <div class="sec">🎮 Spillets gang</div>
      <div class="fase-tabs">
        <button class="fase-tab dag" onclick="setFase('dag')">☀️ Dag</button>
        <button class="fase-tab" onclick="setFase('nat')">🌙 Nat</button>
      </div>
      <div id="fase-indhold"></div>
      <div class="sec" style="font-size:15px;margin-top:1rem">📋 Log</div>
      <div class="log" id="log"></div>
      <div class="btn-row" style="margin-top:1rem">
        <button class="btn btn-g" onclick="tjekSejr()">🏆 Tjek sejr</button>
        <button class="btn btn-g" onclick="nytSpil()">🔄 Nyt spil</button>
      </div>
    </div>
  </div>
</div>

<!-- JOIN -->
<div class="page" id="p-join">
  <div class="center-page">
    <div class="join-card">
      <div style="font-size:48px;margin-bottom:.5rem">🌕</div>
      <div class="join-title">Varulv</div>
      <div class="join-sub">Indtast koden fra din lærer</div>
      <input class="inp" id="j-kode" type="text" placeholder="1234" maxlength="4" inputmode="numeric">
      <input class="inp inp-navn" id="j-navn" type="text" placeholder="Dit navn" maxlength="20">
      <button class="btn btn-p" style="width:100%;justify-content:center" onclick="joinSpil()">Kom med i spillet</button>
      <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)">
        <button class="btn btn-g" style="width:100%;justify-content:center;font-size:12px" onclick="visLeder()">👑 Jeg er lærer</button>
      </div>
    </div>
  </div>
</div>

<!-- VENTER -->
<div class="page" id="p-venter">
  <div class="venter-page">
    <div class="puls" style="font-size:64px">🌕</div>
    <div style="font-family:'DM Serif Display',serif;font-size:24px">Venter på læreren...</div>
    <div style="font-size:14px;color:var(--muted)" id="venter-tekst"></div>
    <div style="font-size:13px;color:var(--muted)">Spillet starter snart 🐺</div>
  </div>
</div>

<!-- ROLLE -->
<div class="page" id="p-rolle">
  <div class="rolle-page">
    <div class="rolle-card" id="rolle-card">
      <span class="re-big" id="r-emoji">🐺</span>
      <div class="rt" id="r-titel"></div>
      <div class="rs" id="r-side"></div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:1rem">👇 Læs din rolle — hold den hemmelig!</div>
      <div class="rd" id="r-desc"></div>
      <div class="rtip" id="r-tip"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const BIN = '6a1e7dd9da38895dfe7a2c38';
const KEY = '$2a$10$HOboKcjEBs.49AjG1RwA0Ot7AJgev8H49spOus1UnNe0JSD4It7f6';
const URL_BASE = 'https://api.jsonbin.io/v3/b/' + BIN;

const ROLLER = [
  {id:'varulv', navn:'Varulv', emoji:'🐺', side:'ond', sideTekst:'🐺 Du er på varulvenes side!', borderFarve:'#DC2626',
   desc:'Hver nat vågner du og dine medvarulve og peger på en borger I vil æde. Om dagen skal I skjule jer og så uskyldige ud som muligt.',
   tip:'💡 Vær overbevisende om dagen — lad ikke nogen opdage dig!', standard:2},
  {id:'borger', navn:'Borger', emoji:'👤', side:'god', sideTekst:'🏡 Du er på landsbyens side!', borderFarve:'#7C3AED',
   desc:'Du er en almindelig borger uden særlige evner. Men din stemme ved dagafstemningen er vigtig! Observer hvem der opfører sig mistænkeligt.',
   tip:'💡 Hvem undgår øjenkontakt? Hvem er for ivrig efter at stemme andre ud?', standard:4},
  {id:'syersken', navn:'Syersken', emoji:'👁️', side:'god', sideTekst:'🏡 Du er på landsbyens side!', borderFarve:'#7C3AED',
   desc:'Hver nat kan du pege på én spiller. Læreren fortæller dig hemmeligt om personen er varulv eller ej. Du er landsbyens hemmelige efterforsker!',
   tip:'💡 Del din viden klogt — men pas på at varulvene ikke finder ud af hvem du er!', standard:1},
  {id:'laege', navn:'Læge', emoji:'💊', side:'god', sideTekst:'🏡 Du er på landsbyens side!', borderFarve:'#059669',
   desc:'Hver nat kan du beskytte én spiller mod varulvenes angreb. Du kan også beskytte dig selv! Du kan ikke beskytte den samme person to nætter i træk.',
   tip:'💡 Prøv at gætte hvem varulvene vil angribe — og beskyt dem!', standard:1},
  {id:'heks', navn:'Heks', emoji:'🧙', side:'god', sideTekst:'🏡 Du er på landsbyens side!', borderFarve:'#D97706',
   desc:'Du har to eliksirer — én der redder den angrebne fra varulvene, og én der dræber en valgfri spiller. Begge kan kun bruges én gang i hele spillet!',
   tip:'💡 Gem din dræbende eliksir til det perfekte øjeblik!', standard:0},
  {id:'jeger', navn:'Jæger', emoji:'🏹', side:'god', sideTekst:'🏡 Du er på landsbyens side!', borderFarve:'#92400E',
   desc:'Når du dør — enten om natten eller ved afstemning — skyder du øjeblikkeligt én anden spiller med dig i graven. Vælg klogt!',
   tip:'💡 Hold din identitet skjult — din kraft er stærkest som en overraskelse!', standard:0},
  {id:'amor', navn:'Amor', emoji:'💘', side:'speciel', sideTekst:'💘 Du er Amor — skab kærlighed!', borderFarve:'#EC4899',
   desc:'Den første nat udpeger du to spillere som bliver forelsket. Hvis den ene dør, dør den anden af sorg. Elskende vinder KUN hvis begge overlever til sidst!',
   tip:'💡 Forener du en varulv og en borger skabes en tredje vinder-betingelse!', standard:0},
];

const ROLLE_MAP = {};
ROLLER.forEach(r => ROLLE_MAP[r.id] = r);

let S = {
  kode: null,
  spillere: [],
  rolleAntal: {},
  fase: 'dag',
  log: [],
  startet: false,
};
ROLLER.forEach(r => S.rolleAntal[r.id] = r.standard);

let minNavn = null;
let minRolle = null;
let erLeder = false;
let pollTimer = null;

// ── API ──
async function gem() {
  try {
    await fetch(URL_BASE, {
      method: 'PUT',
      headers: {'Content-Type':'application/json','X-Master-Key':KEY},
      body: JSON.stringify(S)
    });
  } catch(e) {}
}

async function hent() {
  try {
    const r = await fetch(URL_BASE + '/latest', {
      headers: {'X-Master-Key':KEY,'X-Bin-Meta':'false'}
    });
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { return null; }
}

// ── TOAST ──
function toast(msg, dur=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('vis');
  setTimeout(() => t.classList.remove('vis'), dur);
}

// ── SIDER ──
function vis(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
  document.getElementById(id).classList.add('show');
}

// ── LEDER ──
function visLeder() {
  erLeder = true;
  vis('p-leder');
  // Generer kode
  S.kode = String(Math.floor(1000 + Math.random() * 9000));
  S.spillere = [];
  S.log = [];
  S.startet = false;
  S.fase = 'dag';
  document.getElementById('kode-vis').textContent = S.kode;
  renderRoller();
  gem();
  startPoll();
}

function renderRoller() {
  document.getElementById('roller-grid').innerHTML = ROLLER.map(r => {
    const n = S.rolleAntal[r.id] || 0;
    return `<div class="rk${n>0?' on':''}">
      <span class="re">${r.emoji}</span>
      <div class="rn">${r.navn}</div>
      <div class="antal-row">
        <button class="ab" onclick="chAntal('${r.id}',-1)">−</button>
        <span class="an" id="an-${r.id}">${n}</span>
        <button class="ab" onclick="chAntal('${r.id}',1)">+</button>
      </div>
    </div>`;
  }).join('');
}

function chAntal(id, d) {
  S.rolleAntal[id] = Math.max(0, (S.rolleAntal[id]||0) + d);
  document.getElementById('an-' + id).textContent = S.rolleAntal[id];
  document.getElementById('an-' + id).closest('.rk').className = 'rk' + (S.rolleAntal[id]>0?' on':'');
}

function opdaterLederUI() {
  const n = S.spillere.length;
  document.getElementById('spiller-count').textContent = n;
  const liste = document.getElementById('spiller-liste');
  if (!n) {
    liste.innerHTML = '<div style="font-size:13px;color:var(--muted);font-style:italic">Ingen spillere endnu</div>';
    return;
  }
  liste.innerHTML = S.spillere.map(s => {
    const r = ROLLE_MAP[s.rolle];
    return `<div class="sr">
      <div class="dot ${s.rolle ? 'dot-klar' : 'dot-venter'}"></div>
      <div class="sn">${s.navn}</div>
      <div class="sr-rolle">${s.rolle ? r.emoji+' '+r.navn : 'Venter...'}</div>
    </div>`;
  }).join('');
}

async function startSpil() {
  if (S.spillere.length < 2) { toast('Mindst 2 spillere skal med!'); return; }
  // Byg rolleliste
  let roller = [];
  Object.entries(S.rolleAntal).forEach(([id, n]) => {
    for (let i=0; i<n; i++) roller.push(id);
  });
  while (roller.length < S.spillere.length) roller.push('borger');
  // Bland
  for (let i=roller.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [roller[i],roller[j]] = [roller[j],roller[i]];
  }
  S.spillere.forEach((s,i) => { s.rolle = roller[i]||'borger'; s.i_live = true; });
  S.startet = true;
  S.log = ['🎮 Spillet er startet!'];
  await gem();
  toast('Roller tildelt! ✓');
  visSpilPanel();
}

function visSpilPanel() {
  document.getElementById('spil-panel').style.display = 'block';
  renderSpilPanel();
}

function renderSpilPanel() {
  const i_live = S.spillere.filter(s => s.i_live);
  const fase = S.fase;
  // Fase tabs
  document.querySelectorAll('.fase-tab').forEach(t => t.className = 'fase-tab');
  document.querySelectorAll('.fase-tab')[fase==='dag'?0:1].classList.add(fase);

  let html = '';
  if (fase === 'dag') {
    html = `<p style="font-size:13px;color:var(--muted);margin-bottom:1rem">Diskuter hvem der er varulv. Stem én ud.</p>
    ${i_live.map(s => {
      const r = ROLLE_MAP[s.rolle];
      return `<div class="sr">
        <div class="dot dot-klar"></div>
        <div class="sn">${s.navn} <span style="font-size:11px;color:var(--muted)">(${r.emoji} ${r.navn})</span></div>
        <button class="btn btn-r" style="padding:5px 10px;font-size:12px" onclick="eliminer('${s.navn}')">☠️ Ud</button>
      </div>`;
    }).join('')}`;
  } else {
    html = `<p style="font-size:13px;color:var(--muted);margin-bottom:1rem">Alle lukker øjnene. Vækk rollerne én ad gangen.</p>
    <div style="margin-bottom:1rem">
      <div style="font-size:13px;font-weight:500;margin-bottom:.5rem">🐺 Varulvene angriber — hvem?</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${i_live.map(s=>`<button class="btn btn-g" style="font-size:12px;padding:6px 10px" onclick="natAngreb('${s.navn}')">${s.navn}</button>`).join('')}</div>
    </div>
    <div>
      <div style="font-size:13px;font-weight:500;margin-bottom:.5rem">💊 Lægen beskytter — hvem?</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${i_live.map(s=>`<button class="btn btn-g" style="font-size:12px;padding:6px 10px;border-color:#059669;color:#6EE7B7" onclick="laegeBesky('${s.navn}')">${s.navn}</button>`).join('')}</div>
    </div>`;
  }
  document.getElementById('fase-indhold').innerHTML = html;
  document.getElementById('log').innerHTML = [...S.log].reverse().map(l =>
    `<div class="log-item${l.includes('ædt')||l.includes('ud')||l.includes('dør')?' d':l.includes('beskyttet')||l.includes('reddet')?' h':''}">${l}</div>`
  ).join('');
}

async function setFase(f) {
  S.fase = f;
  renderSpilPanel();
}

let natMaal = null;
function natAngreb(navn) {
  natMaal = navn;
  toast(`🐺 Varulvene sigter på ${navn}`);
}

async function laegeBesky(navn) {
  if (natMaal === navn) {
    S.log.push(`💊 ${navn} blev angrebet men reddet af lægen!`);
    natMaal = null;
    toast(`💊 ${navn} er reddet!`);
  } else {
    S.log.push(`💊 Lægen beskyttede ${navn}`);
    if (natMaal) {
      const offer = S.spillere.find(s => s.navn === natMaal);
      if (offer) {
        offer.i_live = false;
        S.log.push(`🐺 ${natMaal} blev ædt af varulvene!`);
        if (offer.rolle === 'jeger') S.log.push(`🏹 ${natMaal} var jæger og skyder én med sig!`);
        toast(`💀 ${natMaal} er død`, 3000);
      }
      natMaal = null;
    }
    toast(`💊 ${navn} er beskyttet`);
  }
  await gem();
  renderSpilPanel();
  tjekSejr();
}

async function eliminer(navn) {
  if (!confirm(`Stem ${navn} ud?`)) return;
  const s = S.spillere.find(x => x.navn === navn);
  if (s) {
    s.i_live = false;
    const r = ROLLE_MAP[s.rolle];
    S.log.push(`🗳️ ${navn} (${r.navn}) blev stemt ud!`);
    if (s.rolle === 'jeger') S.log.push(`🏹 ${navn} var jæger og skyder én med sig!`);
    await gem();
    renderSpilPanel();
    tjekSejr();
    toast(`${navn} er ude — de var ${r.emoji} ${r.navn}`, 3000);
  }
}

function tjekSejr() {
  const i_live = S.spillere.filter(s => s.i_live);
  const onde = i_live.filter(s => s.rolle === 'varulv' || s.rolle === 'vampyr');
  const gode = i_live.filter(s => ROLLE_MAP[s.rolle]?.side !== 'ond');
  if (onde.length === 0) toast('🎉 LANDSBYEN VINDER! Alle varulve er væk!', 5000);
  else if (onde.length >= gode.length) toast('🐺 VARULVENE VINDER!', 5000);
}

async function nytSpil() {
  if (!confirm('Start nyt spil?')) return;
  clearInterval(pollTimer);
  visLeder();
}

// ── SPILLER ──
async function joinSpil() {
  const kode = document.getElementById('j-kode').value.trim();
  const navn = document.getElementById('j-navn').value.trim();
  if (kode.length !== 4) { toast('Indtast 4-cifret kode'); return; }
  if (!navn) { toast('Skriv dit navn'); return; }

  toast('Forbinder...');
  const data = await hent();
  if (!data || data.kode !== kode) { toast('Forkert kode — prøv igen'); return; }

  // Tilmeld
  if (!data.spillere.find(s => s.navn === navn)) {
    data.spillere.push({navn, rolle: null, i_live: true});
    S = data;
    await gem();
  } else {
    S = data;
  }

  minNavn = navn;
  vis('p-venter');
  document.getElementById('venter-tekst').textContent = navn + ' er tilmeldt ✓';
  startPoll();
}

// ── POLL ──
function startPoll() {
  clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    const data = await hent();
    if (!data) return;
    S = data;
    if (erLeder) {
      opdaterLederUI();
      if (S.startet) visSpilPanel();
    } else if (minNavn) {
      const mig = S.spillere.find(s => s.navn === minNavn);
      if (mig && mig.rolle && !minRolle) {
        minRolle = mig.rolle;
        visRolle(mig.rolle);
      }
    }
  }, 3000);
}

function visRolle(rolleId) {
  const r = ROLLE_MAP[rolleId];
  if (!r) return;
  document.getElementById('r-emoji').textContent = r.emoji;
  document.getElementById('r-titel').textContent = r.navn;
  document.getElementById('r-side').textContent = r.sideTekst;
  document.getElementById('r-desc').textContent = r.desc;
  document.getElementById('r-tip').textContent = r.tip;
  document.getElementById('rolle-card').style.borderColor = r.borderFarve;
  vis('p-rolle');
}

// ── START ──
vis('p-join');
</script>
</body>
</html>
